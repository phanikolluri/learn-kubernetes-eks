apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: app01
spec:
  replicas: 3
  selector:
    matchLabels:
      tier: frontend
  template:
    metadata:
      labels:
        tier: frontend
    spec:
      containers:
        - name: nginx
          image: nginx:1.25

---
apiVersion: apps/v1
kind: Pod
metadata:
  name: app02
  labels:
    tier: app02
spec:
  containers:
    - name: nginx
      image: nginx

