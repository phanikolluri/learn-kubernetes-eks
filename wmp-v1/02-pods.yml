apiVersion: v1
kind: Pod
metadata:
  name: portfolio-service
spec:
  containers:
    - name: portfolio-service
      image: 741957640498.dkr.ecr.us-east-1.amazonaws.com/portfolio-service
      env:
        - name: SPRING_PROFILES_ACTIVE
          value: production
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:postgresql://wmp-dev.ca7so8yw8r9s.us-east-1.rds.amazonaws.com:5432/wmp?currentSchema=portfolio_schema"
        - name: SPRING_DATASOURCE_USERNAME
          value: portfolio_svc_user
        - name: SPRING_DATASOURCE_PASSWORD
          value: localdev123
        - name: JWT_SECRET
          value: myDefaultSuperSecretKeyThatIsAtLeast256BitsLongForHS256Algorithm
        - name: SERVER_PORT
          value: "8080"
