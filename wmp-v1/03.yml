apiVersion: v1
kind: Pod
metadata:
  name: frontend
spec:
  containers:
    - name: frontend
      image: 741957640498.dkr.ecr.us-east-1.amazonaws.com/frontend
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-service-config 
data:
   DB_HOST: "wmp-dev.ca7so8yw8r9s.us-east-1.rds.amazonaws.com"
   DB_PORT: "5432"
   DB_USER: "auth_svc_user"
   DB_PASSWORD: "localdev123"
   DB_NAME: "wmp"
   DB_SCHEMA: "auth_schema"
   SERVER_PORT: "8081"
   JWT_SECRET: "myDefaultSuperSecretKeyThatIsAtLeast256BitsLongForHS256Algorithm"
   PORTFOLIO_SERVICE_URL: "http://localhost:8080"

---
apiVersion: v1
kind: Pod
metadata:
  name: auth-service
spec:
  containers:
    - name: auth-service
      image: 741957640498.dkr.ecr.us-east-1.amazonaws.com/auth-service
      envFrom:
        - configMapRef:
            name: auth-service-config
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: analytics-service-config
data:
   DATABASE_URL: "postgresql+asyncpg://analytics_svc_user:localdev123@wmp-dev.ca7so8yw8r9s.us-east-1.rds.amazonaws.com:5432/wmp"
   DB_SCHEMA: "analytics_schema"
   LOG_LEVEL: "INFO"

---
apiVersion: v1
kind: Pod
metadata:
  name: analytics-service
spec:
  containers:
    - name: analytics-service
      image: 741957640498.dkr.ecr.us-east-1.amazonaws.com/analytics-service
      envFrom:
        - configMapRef:
            name: analytics-service-config
---
apiVersion: v1
kind: portfolio-service-config
metadata:
  name: ConfigMap
data:
  SPRING_PROFILES_ACTIVE: production
  SPRING_DATASOURCE_URL: "jdbc:postgresql://wmp-dev.ca7so8yw8r9s.us-east-1.rds.amazonaws.com:5432/wmp?currentSchema=portfolio_schema"
  SPRING_DATASOURCE_USERNAME: portfolio_svc_user
  SPRING_DATASOURCE_PASSWORD: localdev123
  JWT_SECRET: myDefaultSuperSecretKeyThatIsAtLeast256BitsLongForHS256Algorithm
  SERVER_PORT: "8080"

---
apiVersion: v1
kind: Pod
metadata:
  name: portfolio-service
spec:
  containers:
    - name: portfolio-service
      image: 741957640498.dkr.ecr.us-east-1.amazonaws.com/portfolio-service
      envFrom:
        - configMapRef:
            name: portfolio-service-config

